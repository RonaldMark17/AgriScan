services:
  mysql:
    image: mysql:8.4
    container_name: agriscan-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agriscanproject
      MYSQL_USER: agriscan
      MYSQL_PASSWORD: agriscan_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: agriscan-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: mysql+aiomysql://agriscan:agriscan_password@mysql:3306/agriscanproject
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: agriscan-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
