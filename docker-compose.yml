services:
  backend:
    build:
      context: ./backend
    container_name: agriscan-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/agriscan.sqlite3
      AUTO_CREATE_TABLES: "true"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-http://agriscann.duckdns.org,https://agriscann.duckdns.org}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,agriscann.duckdns.org}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api/v1}"
    container_name: agriscan-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  seed:
    build:
      context: ./backend
    profiles:
      - tools
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/agriscan.sqlite3
      AUTO_CREATE_TABLES: "true"
    command: python scripts/seed_demo_data.py --password ${SEED_DEMO_PASSWORD:-ChangeMe!2026Secure}
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads

volumes:
  backend_data:
  backend_uploads:
